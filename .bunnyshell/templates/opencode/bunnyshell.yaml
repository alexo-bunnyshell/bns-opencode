kind: Environment
name: opencode
type: primary
environmentVariables:
    OPENAI_API_KEY: 'your-api-key-here'
    TTYD_USER: 'admin'
    TTYD_PASS: 'changeme'
security:
    access:
        allowedIps:
            - '0.0.0.0/0'
        realIpTrustedProxies: null
components:
    -
        kind: Application
        name: workspace
        gitRepo: 'https://github.com/alexo-bunnyshell/bns-opencode.git'
        gitBranch: main
        gitApplicationPath: /
        dockerCompose:
            build:
                context: .
                dockerfile: .docker/Dockerfile
                target: dev
            environment:
                OPENAI_API_KEY: '{{ env.vars.OPENAI_API_KEY }}'
                TTYD_USER: '{{ env.vars.TTYD_USER }}'
                TTYD_PASS: '{{ env.vars.TTYD_PASS }}'
            ports:
                - '7681:7681'
        hosts:
            -
                hostname: 'terminal-{{ env.base_domain }}'
                path: /
                servicePort: 7681
        volumes:
            -
                name: workspace-data
                mount: /workspace
                subPath: ''
volumes:
    -
        name: workspace-data
        size: 5Gi
        type: disk
